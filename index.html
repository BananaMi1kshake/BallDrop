<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASMR Pachinko Idle - Telegram Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; transition: background-color 1s ease;
        }
        canvas { display: block; }
        #header { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10;}
        h1 { margin: 0; font-size: 28px; color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; transition: color 1s; }
        p { margin: 5px 0 0 0; color: #aaa; font-size: 14px; }
        #multiplierText { font-size: 16px; color: #4fc3f7; display: block; margin-top: 5px; font-weight: bold;}
        #shardText { font-size: 16px; color: #e040fb; display: none; margin-top: 5px; font-weight: bold; text-shadow: 0 0 8px #e040fb;}
        #saveIndicator { position: absolute; top: 15px; right: 145px; font-size: 12px; color: #888; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 15; }
        
        .top-btn { position: absolute; top: 15px; z-index: 20; background: transparent; border: none; font-size: 24px; cursor: pointer; transition: transform 0.3s; padding: 0; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        #btnSettings { right: 15px; } #btnMissions { right: 55px; } #btnSkills { right: 95px; display: none; }
        .notify-pulse { animation: greenPulse 1s infinite alternate; }
        @keyframes greenPulse { from { text-shadow: 0 0 5px #0f0; transform: scale(1); } to { text-shadow: 0 0 20px #0f0; transform: scale(1.15); } }

        #btnPrestige { position: absolute; top: 55px; right: 15px; z-index: 20; background: linear-gradient(45deg, #ff007f, #7f00ff); border: 2px solid #fff; border-radius: 8px; color: white; padding: 8px 12px; font-weight: bold; cursor: pointer; display: none; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        #shop { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px); display: flex; justify-content: space-around; padding: 10px 5px; box-sizing: border-box; border-top: 1px solid #333; z-index: 10; }
        .upgrade-btn { flex: 1; margin: 0 5px; padding: 8px; background: #222; border: 2px solid #444; border-radius: 8px; color: white; font-weight: bold; text-align: center; cursor: pointer; transition: 0.2s; }
        .upgrade-btn:disabled { opacity: 0.4; border-color: #111; cursor: not-allowed; }
        .btn-title { display: block; font-size: 13px; color: #4fc3f7; }
        .btn-cost { display: block; font-size: 16px; color: #ffeb3b; }
        .btn-level { display: block; font-size: 11px; color: #888; }

        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .modal-box { background: #1a1a24; border: 2px solid #4fc3f7; border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 0 30px rgba(79, 195, 247, 0.4); max-width: 85%; width: 320px; max-height: 80%; overflow-y: auto; }
        .btn-ad { display: block; width: 100%; background: linear-gradient(45deg, #ff007f, #7f00ff); color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 16px; animation: pulse 1.5s infinite alternate; }
        .btn-claim { display: block; width: 100%; background: #4caf50; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-close { display: block; width: 100%; background: #444; color: #aaa; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; margin-top: 10px; }
        .list-item { background: #222; border: 1px solid #555; border-radius: 8px; padding: 10px; margin-bottom: 10px; text-align: left; }
        .mission-progress { width: 100%; background: #000; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
        .mission-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.3s; }
        .btn-skill { background: #9c27b0; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; margin-top: 5px;}
    </style>
</head>
<body>

    <div id="header">
        <h1 id="titleText">$<span id="moneyText">0</span></h1>
        <span id="multiplierText">Multiplier: x1</span>
        <span id="shardText">💎 <span id="shardCount">0</span> Shards</span>
        <p>Tap to drop!</p>
    </div>
    
    <div id="saveIndicator">Cloud Saved</div>
    
    <button id="btnSettings" class="top-btn" onpointerdown="openSettings()">⚙️</button>
    <button id="btnMissions" class="top-btn" onpointerdown="openMissions()">📋</button>
    <button id="btnSkills" class="top-btn" onpointerdown="openSkills()">🧬</button>
    <button id="btnPrestige" onpointerdown="doPrestige()">✨ PRESTIGE ($1M)</button>

    <div id="shop">
        <button id="btnAuto" class="upgrade-btn" onpointerdown="buyUpgrade('auto')">
            <span class="btn-title">🤖 Auto-Drop</span>
            <span class="btn-cost" id="costAuto">$100</span><span class="btn-level" id="lvlAuto">Lvl 0</span>
        </button>
        <button id="btnMult" class="upgrade-btn" onpointerdown="buyUpgrade('mult')">
            <span class="btn-title">💎 Ball Value</span>
            <span class="btn-cost" id="costMult">$250</span><span class="btn-level" id="lvlMult">Lvl 1</span>
        </button>
        <button id="btnBounce" class="upgrade-btn" onpointerdown="buyUpgrade('bounce')">
            <span class="btn-title">🏀 Bounciness</span>
            <span class="btn-cost" id="costBounce">$500</span><span class="btn-level" id="lvlBounce">Lvl 0</span>
        </button>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">Reward</h2>
            <p id="modalDesc">Details here.</p>
            <button id="btnModalAd" class="btn-ad">Watch Ad</button>
            <button id="btnModalClaim" class="btn-close">No Thanks</button>
        </div>
    </div>

    <div id="settingsOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2>⚙️ Settings</h2>
            <button id="btnMuteToggle" class="btn-close" onpointerdown="toggleMute()" style="color: white; margin-bottom: 15px;">🔊 Audio: ON</button>
            <button class="btn-close" onpointerdown="hardReset()" style="background:#cc0000; color:white;">⚠️ WIPE SAVE DATA</button>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <div id="missionsOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: #4caf50;">📋 Missions</h2>
            <div id="missionList"></div>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <div id="skillsOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: #e040fb;">🧬 Meta-Skills</h2>
            <p style="color: #e040fb;">💎 <span id="modalShardCount">0</span> Shards</p>
            <div id="skillList"></div>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Adsgram Initialization
    let AdController = null;
    function getAdController() {
        if (AdController) return AdController;
        if (window.Adsgram) { AdController = window.Adsgram.init({ blockId: "25014" }); return AdController; }
        return null;
    }

    const AdManager = {
        isAdPlaying: false,
        showRewardedVideo: async function(rewardName, onSuccess, onFail) {
            const controller = getAdController();
            if (!controller) { if(confirm("SDK Offline. Simulate Reward?")) onSuccess(); return; }
            this.isAdPlaying = true;
            if(audioCtx) audioCtx.suspend(); 
            try {
                const result = await controller.show();
                if (result.done) onSuccess(); else if(onFail) onFail();
            } catch (e) { if(onFail) onFail(); } finally {
                this.isAdPlaying = false;
                if(!isAudioMuted && audioCtx) audioCtx.resume();
            }
        },
        showInterstitial: async function(onClose) { await this.showRewardedVideo("Inter", onClose, onClose); }
    };

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    const moneyText = document.getElementById('moneyText');
    const btnPrestige = document.getElementById('btnPrestige');
    const multiplierText = document.getElementById('multiplierText');
    const shardText = document.getElementById('shardText');
    const shardCountUI = document.getElementById('shardCount');

    let width, height, isGamePaused = false, isAudioMuted = false;
    let prestigeLevel = 0, money = 0, prestigeMultiplier = 1, neonShards = 0;

    const themes = [
        { name: "Classic", bg: "#111", pegOff: "#444", textMain: "#ffeb3b" },
        { name: "Cyberpunk", bg: "#050510", pegOff: "#0b3d60", textMain: "#00ffff" },
        { name: "Inferno", bg: "#1a0000", pegOff: "#4a1500", textMain: "#ff5722" }
    ];
    let currentTheme = themes[0];

    const upgrades = {
        auto: { level: 0, baseCost: 100, costMult: 2.5, elCost: document.getElementById('costAuto'), elLvl: document.getElementById('lvlAuto'), btn: document.getElementById('btnAuto') },
        mult: { level: 1, baseCost: 250, costMult: 2.0, elCost: document.getElementById('costMult'), elLvl: document.getElementById('lvlMult'), btn: document.getElementById('btnMult') },
        bounce: { level: 0, baseCost: 500, costMult: 3.0, elCost: document.getElementById('costBounce'), elLvl: document.getElementById('lvlBounce'), btn: document.getElementById('btnBounce') }
    };

    const metaSkills = {
        maxBalls: { level: 0, max: 10, cost: 1, name: "Max Balls (+5)", desc: "Increases screen cap." },
        feverTime: { level: 0, max: 10, cost: 1, name: "Extended Climax (+1s)", desc: "Fever lasts longer." },
        mutationRate: { level: 0, max: 10, cost: 2, name: "Mutation (+1%)", desc: "More Special Pegs." }
    };

    let baseHitValue = 1, bounceFactor = 0.5, feverCharge = 0, feverActive = false, feverFramesLeft = 0;
    let stats = { ballsDropped: 0, goldHit: 0, portalsHit: 0, feversTriggered: 0 };
    let activeMissions = [], missionsCompleted = 0;
    let goblin = { active: false, x: 0, y: 0, r: 25, time: 0, dir: 1 }; let lastGoblinSpawnTime = Date.now();

    function formatMoney(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return Math.floor(num).toString();
    }

    function saveGame() {
        const data = { 
            money, prestigeLevel, neonShards, stats, missionsCompleted, activeMissions,
            upgrades: { auto: upgrades.auto.level, mult: upgrades.mult.level, bounce: upgrades.bounce.level },
            meta: { max: metaSkills.maxBalls.level, fever: metaSkills.feverTime.level, mut: metaSkills.mutationRate.level },
            lastSave: Date.now()
        };
        tg.CloudStorage.setItem('pachinko_v3', JSON.stringify(data), (err, ok) => {
            if(ok) { document.getElementById('saveIndicator').style.opacity = 1; setTimeout(() => document.getElementById('saveIndicator').style.opacity = 0, 1000); }
        });
    }

    function loadGame() {
        tg.CloudStorage.getItem('pachinko_v3', (err, val) => {
            if(val) {
                const s = JSON.parse(val);
                money = s.money || 0; prestigeLevel = s.prestigeLevel || 0; neonShards = s.neonShards || 0;
                stats = s.stats || stats; missionsCompleted = s.missionsCompleted || 0;
                activeMissions = s.activeMissions || [];
                if(s.upgrades) { upgrades.auto.level = s.upgrades.auto; upgrades.mult.level = s.upgrades.mult; upgrades.bounce.level = s.upgrades.bounce; }
                if(s.meta) { metaSkills.maxBalls.level = s.meta.max; metaSkills.feverTime.level = s.meta.fever; metaSkills.mutationRate.level = s.meta.mut; }
                
                prestigeMultiplier = 1 + (prestigeLevel * 2);
                baseHitValue = upgrades.mult.level;
                bounceFactor = Math.min(0.8, 0.5 + (upgrades.bounce.level * 0.075));
                currentTheme = themes[prestigeLevel % themes.length];
                document.body.style.backgroundColor = currentTheme.bg;
                
                if (s.lastSave && upgrades.auto.level > 0) {
                    let secondsAway = Math.floor((Date.now() - s.lastSave) / 1000);
                    if (secondsAway > 60) {
                        let dropsPerSec = 1000 / Math.max(250, 3000 - (upgrades.auto.level * 300));
                        let estimated = Math.min(secondsAway, 43200) * dropsPerSec * (baseHitValue * 5 * prestigeMultiplier);
                        showOfflineModal(estimated);
                    }
                }
            }
            initBoard(); initMissions(); updateUI();
        });
    }

    function updateUI() {
        moneyText.innerText = formatMoney(money);
        multiplierText.innerText = `Multiplier: x${prestigeMultiplier} (${currentTheme.name})`;
        for (let key in upgrades) {
            let u = upgrades[key];
            let cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level - (key === 'mult' ? 1 : 0)));
            u.elCost.innerText = (key === 'bounce' && u.level >= 4) ? "MAX" : "$" + formatMoney(cost);
            u.elLvl.innerText = "Lvl " + u.level;
            u.btn.disabled = money < cost || (key === 'bounce' && u.level >= 4);
        }
        btnPrestige.style.display = money >= 1000000 ? 'block' : 'none';
        if (prestigeLevel > 0 || neonShards > 0) { shardText.style.display = 'block'; document.getElementById('btnSkills').style.display = 'block'; shardCountUI.innerText = neonShards; }
    }

    function buyUpgrade(type) {
        let u = upgrades[type];
        let cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level - (type === 'mult' ? 1 : 0)));
        if (money >= cost) {
            money -= cost; u.level++;
            if (type === 'mult') baseHitValue = u.level;
            else if (type === 'bounce') bounceFactor = Math.min(0.8, 0.5 + (u.level * 0.075));
            updateUI(); saveGame();
        }
    }

    // --- ENGINE ---
    let balls = [], pegs = [], buckets = [], particles = [], floatingTexts = [];
    const gravity = 0.2, paddle = { x: 100, y: 0, width: 60, height: 10, vx: 4 };

    function initBoard() {
        pegs = []; buckets = [];
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        paddle.y = height * 0.15; paddle.x = width/2; paddle.vx = 4; // Reset velocity
        for(let r=0; r<10; r++) {
            let cols = r%2 ? 7 : 8;
            for(let c=0; c<cols; c++) { pegs.push({ x: (c+1)*(width/(cols+1)), y: height*0.3 + r*45, r: 6, type: 0, flash: 0, pulse: Math.random()*Math.PI*2 }); }
        }
        for(let i=0; i<5; i++) buckets.push({ x: i*(width/5), y: height-140, w: width/5, mult: [1,3,5,3,1][i], color: ["#888","#4fc3f7","#ffeb3b","#4fc3f7","#888"][i], flash: 0 });
    }

    class FloatingText { constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; } update() { this.y -= 1.5; this.life -= 0.02; } draw() { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = 1; } }
    class Ball { constructor(x, y) { this.x = x; this.y = y; this.vx = (Math.random()-0.5)*3; this.vy = feverActive?6:2; this.r = 7; this.color = `hsl(${Math.random()*360}, 100%, 70%)`; this.combo = 0; } update() { this.vy += gravity; this.x += this.vx; this.y += this.vy; if(this.x<7 || this.x>width-7) this.vx *= -bounceFactor; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fillStyle = feverActive?"#fff":this.color; ctx.fill(); } }

    function resolve() {
        for(let i=balls.length-1; i>=0; i--) {
            let b = balls[i];
            for(let p of pegs) {
                let dx = b.x - p.x, dy = b.y - p.y, d = Math.sqrt(dx*dx+dy*dy);
                if(d < b.r + p.r) {
                    let overlap = (b.r + p.r) - d; let nx = dx/d; let ny = dy/d; b.x += nx*overlap; b.y += ny*overlap;
                    b.vy *= -bounceFactor; b.vx += (Math.random()-0.5)*2; p.flash = 15;
                    let earned = (baseHitValue * 0.1 * prestigeMultiplier * (feverActive?3:1)); money += earned;
                    tg.HapticFeedback.impactOccurred('light');
                    if (Math.random() < 0.015 + (metaSkills.mutationRate.level * 0.01)) p.type = 1;
                }
            }
            if(b.y > height-140) {
                let idx = Math.floor(b.x / (width/5));
                if(buckets[idx]) {
                    let earned = (baseHitValue * 10 * buckets[idx].mult * prestigeMultiplier * (feverActive?3:1));
                    money += earned; buckets[idx].flash = 20; floatingTexts.push(new FloatingText(b.x, b.y-20, `+$${Math.floor(earned)}`, buckets[idx].color));
                    tg.HapticFeedback.notificationOccurred('success');
                    if(!feverActive) { feverCharge += buckets[idx].mult * 10; if(feverCharge >= 1500) triggerFever(); }
                }
                balls.splice(i, 1);
            }
        }
    }

    function triggerFever() { feverActive = true; feverFramesLeft = 600 + (metaSkills.feverTime.level * 60); feverCharge = 1500; stats.feversTriggered++; playFeverChord(); }

    let lastDrop = 0;
    function gameLoop(timestamp) {
        if(isGamePaused || AdManager.isAdPlaying) { requestAnimationFrame(gameLoop); return; }
        ctx.fillStyle = currentTheme.bg; ctx.fillRect(0,0,width,height);
        
        // Paddle Movement Fix
        let pSpeed = feverActive ? 10 : 4;
        paddle.x += paddle.vx > 0 ? pSpeed : -pSpeed;
        if(paddle.x < 40) { paddle.x = 40; paddle.vx = 1; }
        if(paddle.x > width - 40) { paddle.x = width - 40; paddle.vx = -1; }
        
        ctx.fillStyle = "#fff"; ctx.fillRect(paddle.x-30, paddle.y-5, 60, 10);

        if(upgrades.auto.level > 0 && timestamp - lastDrop > (3000 - (upgrades.auto.level * 300))) {
            if(balls.length < 40 + (metaSkills.maxBalls.level * 5)) { balls.push(new Ball(paddle.x, paddle.y+10)); stats.ballsDropped++; }
            lastDrop = timestamp;
        }

        if(feverActive) { 
            feverFramesLeft--; if(feverFramesLeft <= 0) { feverActive = false; feverCharge = 0; }
            if(timestamp % 100 < 30) balls.push(new Ball(paddle.x, paddle.y+10));
        }

        for(let p of pegs) { ctx.fillStyle = p.flash > 0 ? "#fff" : (p.type==1?"#ffd700":currentTheme.pegOff); ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); if(p.flash>0) p.flash--; }
        for(let bk of buckets) { ctx.fillStyle = bk.flash>0?"#fff":currentTheme.bg; ctx.fillRect(bk.x, bk.y, bk.w, 40); ctx.strokeStyle = bk.color; ctx.strokeRect(bk.x, bk.y, bk.w, 40); if(bk.flash>0) bk.flash--; }
        for(let b of balls) { b.update(); b.draw(); }
        for(let i=floatingTexts.length-1; i>=0; i--) { floatingTexts[i].update(); floatingTexts[i].draw(); if(floatingTexts[i].life<=0) floatingTexts.splice(i,1); }

        if (goblin.active) {
            goblin.time += 0.05; goblin.x += goblin.dir * 3; goblin.y = height * 0.4 + Math.sin(goblin.time) * 50; 
            ctx.font = "40px sans-serif"; ctx.fillText("👽", goblin.x, goblin.y);
            if (goblin.x < -100 || goblin.x > width + 100) goblin.active = false;
        } else if (!feverActive && Math.random() < 0.001) { goblin.active = true; goblin.x = -50; goblin.dir = 1; }

        drawFeverBar(); resolve(); updateUI(); requestAnimationFrame(gameLoop);
    }

    function drawFeverBar() {
        const barW = 200, barX = (width-barW)/2, barY = 20;
        ctx.fillStyle = "#333"; ctx.fillRect(barX, barY, barW, 10);
        ctx.fillStyle = feverActive ? "#ffeb3b" : "#ff007f";
        ctx.fillRect(barX, barY, barW * (feverActive ? feverFramesLeft/600 : feverCharge/1500), 10);
    }

    // Modal Logic
    function initMissions() { if(activeMissions.length==0) for(let i=0; i<3; i++) activeMissions.push({desc:"Drop 50 Balls", target:stats.ballsDropped+50, reward:1000}); }
    function openMissions() { 
        isGamePaused = true; 
        document.getElementById('missionList').innerHTML = activeMissions.map((m,i)=> {
            let prog = Math.min(100, (stats.ballsDropped / m.target)*100);
            return `<div class="list-item">${m.desc}<div class="mission-progress"><div class="mission-fill" style="width:${prog}%"></div></div><button class="btn-claim" ${prog<100?'disabled':''} onclick="claimMission(${i})">Claim Reward</button></div>`
        }).join('');
        document.getElementById('missionsOverlay').style.display='flex'; 
    }
    window.claimMission = (i) => { money += activeMissions[i].reward; activeMissions[i].target += 50; openMissions(); };

    function showOfflineModal(amt) {
        isGamePaused = true; document.getElementById('modalTitle').innerText = "Offline Profit!";
        document.getElementById('modalDesc').innerText = `You earned $${formatMoney(amt)} while away.`;
        document.getElementById('btnModalAd').onclick = () => AdManager.showRewardedVideo("3x", ()=> { money+=amt*3; closeModals(); });
        document.getElementById('btnModalClaim').onclick = () => { money+=amt; closeModals(); };
        document.getElementById('modalOverlay').style.display='flex';
    }

    function doPrestige() {
        AdManager.showInterstitial(() => {
            neonShards += (prestigeLevel + 1); prestigeLevel++; money = 0;
            upgrades.auto.level = 0; upgrades.mult.level = 1; upgrades.bounce.level = 0;
            prestigeMultiplier = 1 + (prestigeLevel * 2);
            currentTheme = themes[prestigeLevel % themes.length];
            document.body.style.backgroundColor = currentTheme.bg;
            saveGame(); initBoard();
        });
    }

    function openSettings() { isGamePaused = true; document.getElementById('settingsOverlay').style.display = 'flex'; }
    function openSkills() { 
        document.getElementById('modalShardCount').innerText = neonShards;
        document.getElementById('skillList').innerHTML = Object.keys(metaSkills).map(k => `<div class="list-item">${metaSkills[k].name}<button class="btn-skill" onclick="buySkill('${k}')">Upgrade (${metaSkills[k].cost} 💎)</button></div>`).join('');
        isGamePaused = true; document.getElementById('skillsOverlay').style.display = 'flex'; 
    }
    window.buySkill = (k) => { if(neonShards >= metaSkills[k].cost) { neonShards -= metaSkills[k].cost; metaSkills[k].level++; openSkills(); updateUI(); } };
    function closeModals() { isGamePaused = false; document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); saveGame(); }
    function hardReset() { tg.CloudStorage.removeItem('pachinko_v3', () => location.reload()); }
    function toggleMute() { isAudioMuted = !isAudioMuted; document.getElementById('btnMuteToggle').innerText = isAudioMuted ? "🔇 Audio: OFF" : "🔊 Audio: ON"; }

    window.addEventListener('pointerdown', (e) => { 
        if(e.target.closest('button') || isGamePaused) return;
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(goblin.active && Math.sqrt((e.clientX-goblin.x)**2 + (e.clientY-goblin.y)**2) < 40) {
            goblin.active = false; triggerFever(); return;
        }
        balls.push(new Ball(paddle.x, paddle.y+10)); stats.ballsDropped++;
    });

    let audioCtx = null;
    function playFeverChord() { if(!audioCtx || isAudioMuted) return; [261, 329, 392].forEach(f => { let o = audioCtx.createOscillator(); let g = audioCtx.createGain(); o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+1); }); }

    loadGame();
    requestAnimationFrame(gameLoop);
</script>
</body>
