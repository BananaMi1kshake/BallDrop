<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASMR Pachinko Idle - Telegram Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111; overflow: hidden;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; transition: background-color 1s ease;
        }
        canvas { display: block; }
        
        #header { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10;}
        h1 { margin: 0; font-size: 28px; color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; transition: color 1s; }
        p { margin: 5px 0 0 0; color: #aaa; font-size: 14px; }
        #multiplierText { font-size: 16px; color: #4fc3f7; display: block; margin-top: 5px; font-weight: bold;}
        #shardText { font-size: 16px; color: #e040fb; display: none; margin-top: 5px; font-weight: bold; text-shadow: 0 0 8px #e040fb;}
        
        #saveIndicator {
            position: absolute; top: 15px; right: 145px; font-size: 12px; color: #888;
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 15;
        }

        .top-btn {
            position: absolute; top: 15px; z-index: 20;
            background: transparent; border: none; font-size: 24px; cursor: pointer;
            transition: transform 0.3s; padding: 0; text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        #btnSettings { right: 15px; } #btnSettings:hover { transform: rotate(90deg); }
        #btnMissions { right: 55px; } #btnMissions:hover { transform: scale(1.1); }
        #btnSkills { right: 95px; display: none; } #btnSkills:hover { transform: scale(1.1); }
        
        .notify-pulse { animation: greenPulse 1s infinite alternate; }
        @keyframes greenPulse { from { text-shadow: 0 0 5px #0f0; transform: scale(1); } to { text-shadow: 0 0 20px #0f0; transform: scale(1.15); } }

        #btnPrestige {
            position: absolute; top: 55px; right: 15px; z-index: 20;
            background: linear-gradient(45deg, #ff007f, #7f00ff); border: 2px solid #fff; border-radius: 8px; color: white;
            padding: 8px 12px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            display: none; animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        #shop {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px);
            display: flex; justify-content: space-around; padding: 10px 5px;
            box-sizing: border-box; border-top: 1px solid #333; z-index: 10;
        }
        
        .upgrade-btn {
            flex: 1; margin: 0 5px; padding: 8px; background: #222; border: 2px solid #444; border-radius: 8px;
            color: white; font-weight: bold; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .upgrade-btn:disabled { opacity: 0.4; border-color: #111; cursor: not-allowed; }
        .btn-title { display: block; font-size: 13px; margin-bottom: 2px; color: #4fc3f7; }
        .btn-cost { display: block; font-size: 16px; color: #ffeb3b; }
        .btn-level { display: block; font-size: 11px; color: #888; margin-top: 3px; }

        .upgrade-btn *, .top-btn *, .btn-skill * { pointer-events: none; }

        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column;
        }
        .modal-box {
            background: #1a1a24; border: 2px solid #4fc3f7; border-radius: 12px; padding: 25px;
            text-align: center; box-shadow: 0 0 30px rgba(79, 195, 247, 0.4); max-width: 80%; width: 320px; max-height: 80%; overflow-y: auto;
        }
        .modal-box h2 { margin-top: 0; color: #ffeb3b; font-size: 24px; }
        .modal-box p { color: #ddd; font-size: 16px; margin-bottom: 20px; }
        
        .list-item { background: #222; border: 1px solid #555; border-radius: 8px; padding: 10px; margin-bottom: 10px; text-align: left; }
        .list-desc { font-size: 14px; color: #fff; margin-bottom: 5px; }
        .mission-progress { width: 100%; background: #000; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 8px; }
        .mission-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.3s; }
        
        .btn-ad { display: block; width: 100%; background: linear-gradient(45deg, #ff007f, #7f00ff); color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 16px; animation: pulse 1.5s infinite alternate; }
        .btn-claim { display: block; width: 100%; background: #4caf50; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-danger { display: block; width: 100%; background: #cc0000; color: white; padding: 12px 20px; border: 2px solid #ff4444; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; font-size: 16px; }
        .btn-close { display: block; width: 100%; background: #444; color: #aaa; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; margin-top: 10px; }
        
        .btn-skill { background: #9c27b0; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; margin-top: 5px;}
    </style>
</head>
<body>

    <div id="header">
        <h1 id="titleText">$<span id="moneyText">0</span></h1>
        <span id="multiplierText">Multiplier: x1</span>
        <span id="shardText">💎 <span id="shardCount">0</span> Shards</span>
        <p>Tap or press SPACE to drop!</p>
    </div>
    
    <div id="saveIndicator">Cloud Saved...</div>
    
    <button id="btnSettings" class="top-btn" onpointerdown="openSettings()">⚙️</button>
    <button id="btnMissions" class="top-btn" onpointerdown="openMissions()">📋</button>
    <button id="btnSkills" class="top-btn" onpointerdown="openSkills()">🧬</button>
    <button id="btnPrestige" onpointerdown="doPrestige()">✨ PRESTIGE ($1M)</button>

    <div id="shop">
        <button id="btnAuto" class="upgrade-btn" onpointerdown="buyUpgrade('auto')">
            <span class="btn-title">🤖 Auto-Drop</span>
            <span class="btn-cost" id="costAuto">$100</span><span class="btn-level" id="lvlAuto">Lvl 0</span>
        </button>
        <button id="btnMult" class="upgrade-btn" onpointerdown="buyUpgrade('mult')">
            <span class="btn-title">💎 Ball Value</span>
            <span class="btn-cost" id="costMult">$250</span><span class="btn-level" id="lvlMult">Lvl 1</span>
        </button>
        <button id="btnBounce" class="upgrade-btn" onpointerdown="buyUpgrade('bounce')">
            <span class="btn-title">🏀 Bounciness</span>
            <span class="btn-cost" id="costBounce">$500</span><span class="btn-level" id="lvlBounce">Lvl 0</span>
        </button>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">Reward</h2>
            <p id="modalDesc">Details here.</p>
            <button id="btnModalAd" class="btn-ad">Watch Ad</button>
            <button id="btnModalClaim" class="btn-close">No Thanks</button>
        </div>
    </div>

    <div id="settingsOverlay" class="modal-overlay">
        <div class="modal-box" style="border-color: #888;">
            <h2 style="color: #fff;">⚙️ Settings</h2>
            <button id="btnMuteToggle" class="btn-close" onpointerdown="toggleMute()" style="font-size: 16px; padding: 15px; color: white; margin-bottom: 15px;">🔊 Audio: ON</button>
            <button class="btn-danger" onpointerdown="hardReset()">⚠️ WIPE SAVE DATA</button>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <div id="missionsOverlay" class="modal-overlay">
        <div class="modal-box" style="border-color: #4caf50;">
            <h2 style="color: #4caf50;">📋 Missions</h2>
            <div id="missionList"></div>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <div id="skillsOverlay" class="modal-overlay">
        <div class="modal-box" style="border-color: #9c27b0;">
            <h2 style="color: #e040fb;">🧬 Meta-Skills</h2>
            <p style="color: #e040fb; font-weight: bold; margin-top: -15px;">💎 <span id="modalShardCount">0</span> Shards</p>
            <div id="skillList"></div>
            <button class="btn-close" onpointerdown="closeModals()">Close</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    // --- TELEGRAM & ADSGRAM BRIDGE ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let AdController = null;
    function getAdController() {
        if (AdController) return AdController;
        if (window.Adsgram) { 
            AdController = window.Adsgram.init({ blockId: "25014" });
            return AdController;
        }
        return null;
    }

    const AdManager = {
        isAdPlaying: false,
        showRewardedVideo: async function(rewardName, onSuccess, onFail) {
            const controller = getAdController();
            this.isAdPlaying = true;
            if(audioCtx) audioCtx.suspend(); 
            
            try {
                const result = controller ? await controller.show() : {done: confirm("[DEV] Watch Ad?")};
                if (result.done) onSuccess(); else if(onFail) onFail();
            } catch (e) { if(onFail) onFail(); } finally {
                this.isAdPlaying = false;
                if(!isAudioMuted && audioCtx) audioCtx.resume();
            }
        },
        showInterstitial: async function(onClose) {
            const controller = getAdController();
            this.isAdPlaying = true;
            if(audioCtx) audioCtx.suspend();
            try {
                if (controller) await controller.show();
            } catch (e) {} finally {
                this.isAdPlaying = false;
                if(!isAudioMuted && audioCtx) audioCtx.resume();
                if(onClose) onClose();
            }
        }
    };

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    const moneyText = document.getElementById('moneyText'); const btnPrestige = document.getElementById('btnPrestige');
    const titleText = document.getElementById('titleText'); const multiplierText = document.getElementById('multiplierText');
    const saveIndicator = document.getElementById('saveIndicator'); const btnMissions = document.getElementById('btnMissions');
    const btnSkills = document.getElementById('btnSkills'); const shardText = document.getElementById('shardText');
    const shardCountUI = document.getElementById('shardCount'); const modalShardCount = document.getElementById('modalShardCount');
    
    const modalOverlay = document.getElementById('modalOverlay'); const settingsOverlay = document.getElementById('settingsOverlay');
    const missionsOverlay = document.getElementById('missionsOverlay'); const missionList = document.getElementById('missionList');
    const skillsOverlay = document.getElementById('skillsOverlay'); const skillList = document.getElementById('skillList');
    const btnMuteToggle = document.getElementById('btnMuteToggle'); const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc'); const btnModalAd = document.getElementById('btnModalAd');
    const btnModalClaim = document.getElementById('btnModalClaim');

    let width, height; let isGamePaused = false; let isAudioMuted = false;

    // RESTORED ECONOMY & STATS
    let prestigeLevel = 0; const PRESTIGE_COST = 1000000; 
    const themes = [
        { name: "Classic", bg: "#111", trail: "rgba(17, 17, 17, 0.35)", pegOff: "#444", textMain: "#ffeb3b" },
        { name: "Cyberpunk", bg: "#050510", trail: "rgba(5, 5, 16, 0.35)", pegOff: "#0b3d60", textMain: "#00ffff" },
        { name: "Inferno", bg: "#1a0000", trail: "rgba(26, 0, 0, 0.35)", pegOff: "#4a1500", textMain: "#ff5722" },
        { name: "Radiant", bg: "#101510", trail: "rgba(16, 21, 16, 0.35)", pegOff: "#1b4d22", textMain: "#55ff55" }
    ];
    let currentTheme = themes[0]; let money = 0; let prestigeMultiplier = 1;

    let neonShards = 0;
    const metaSkills = {
        maxBalls: { level: 0, max: 10, cost: 1, name: "Max Balls Capacity (+5)", desc: "Increases screen cap." },
        feverTime: { level: 0, max: 10, cost: 1, name: "Extended Climax (+1s)", desc: "Fever Mode lasts longer." },
        mutationRate: { level: 0, max: 10, cost: 2, name: "Mutation Mastery (+1%)", desc: "More Special Pegs spawn." }
    };

    const upgrades = {
        auto: { level: 0, baseCost: 100, costMult: 2.5, elCost: document.getElementById('costAuto'), elLvl: document.getElementById('lvlAuto'), btn: document.getElementById('btnAuto') },
        mult: { level: 1, baseCost: 250, costMult: 2.0, elCost: document.getElementById('costMult'), elLvl: document.getElementById('lvlMult'), btn: document.getElementById('btnMult') },
        bounce: { level: 0, baseCost: 500, costMult: 3.0, elCost: document.getElementById('costBounce'), elLvl: document.getElementById('lvlBounce'), btn: document.getElementById('btnBounce') }
    };

    let baseHitValue = 1; let bounceFactor = 0.5; let lastAutoDropTime = 0; let shakeAmount = 0;
    let feverCharge = 0; const MAX_FEVER = 1500; let feverActive = false; let feverFramesLeft = 0; let feverCooldown = 0; 
    let goblin = { active: false, x: 0, y: 0, r: 25, time: 0, dir: 1 }; let lastGoblinSpawnTime = Date.now();

    function getMaxBalls() { return 40 + (metaSkills.maxBalls.level * 5); }
    function getFeverDuration() { return 600 + (metaSkills.feverTime.level * 60); }
    function getMutationRate() { return 0.015 + (metaSkills.mutationRate.level * 0.01); }

    let stats = { ballsDropped: 0, goldHit: 0, portalsHit: 0, feversTriggered: 0 };
    let activeMissions = []; let missionsCompleted = 0;
    const missionTypes = [
        { type: 'balls', desc: "Drop balls", baseTarget: 50 }, { type: 'gold', desc: "Hit Gold Pegs", baseTarget: 5 },
        { type: 'portals', desc: "Enter Portals", baseTarget: 3 }, { type: 'fever', desc: "Trigger Fever Mode", baseTarget: 1 }
    ];

    function generateMission() {
        let difficultyMult = 1 + (missionsCompleted * 0.1); 
        let template = missionTypes[Math.floor(Math.random() * missionTypes.length)];
        let target = Math.ceil(template.baseTarget * difficultyMult);
        let startProgress = stats[template.type === 'gold' ? 'goldHit' : (template.type === 'portals' ? 'portalsHit' : (template.type === 'fever' ? 'feversTriggered' : 'ballsDropped'))];
        return { id: Math.random().toString(36).substr(2, 9), type: template.type, desc: `${template.desc} (${target})`, target: startProgress + target, rewardBase: 500 * difficultyMult };
    }

    function initMissions() { if (activeMissions.length === 0) for(let i=0; i<3; i++) activeMissions.push(generateMission()); }

    function checkMissions() {
        let ready = false;
        activeMissions.forEach(m => {
            let current = stats[m.type === 'gold' ? 'goldHit' : (m.type === 'portals' ? 'portalsHit' : (m.type === 'fever' ? 'feversTriggered' : 'ballsDropped'))];
            if (current >= m.target) ready = true;
        });
        if (ready) btnMissions.classList.add('notify-pulse'); else btnMissions.classList.remove('notify-pulse');
    }

    function renderMissions() {
        missionList.innerHTML = '';
        activeMissions.forEach((m, index) => {
            let current = stats[m.type === 'gold' ? 'goldHit' : (m.type === 'portals' ? 'portalsHit' : (m.type === 'fever' ? 'feversTriggered' : 'ballsDropped'))];
            let progress = Math.min(100, (current / m.target) * 100); let isComplete = current >= m.target;
            let rewardAmount = m.rewardBase * prestigeMultiplier * baseHitValue;
            missionList.innerHTML += `<div class="list-item"><div class="list-desc">${m.desc} - Reward: $${formatMoney(rewardAmount)}</div><div class="mission-progress"><div class="mission-fill" style="width: ${progress}%;"></div></div><button class="btn-claim" ${isComplete ? '' : 'disabled'} onpointerdown="claimMission(${index}, ${rewardAmount})">${isComplete ? 'Claim Reward' : Math.floor(progress) + '%'}</button></div>`;
        });
    }

    window.claimMission = function(index, reward) {
        money += reward; floatingTexts.push(new FloatingText(width/2, height/2, `MISSION COMPLETE! +$${formatMoney(reward)}`, '#0f0', 24));
        spawnParticles(width/2, height/2, '#0f0', 30); missionsCompleted++;
        activeMissions[index] = generateMission(); renderMissions(); updateUI(); saveGame(); checkMissions();
    };

    function renderSkills() {
        skillList.innerHTML = ''; modalShardCount.innerText = neonShards;
        for (let key in metaSkills) {
            let s = metaSkills[key]; let isMaxed = s.level >= s.max; let canAfford = neonShards >= s.cost && !isMaxed;
            skillList.innerHTML += `<div class="list-item"><div class="list-desc" style="color: #e040fb; font-weight: bold;">${s.name} (Lvl ${s.level}/${s.max})</div><div style="font-size: 12px; color: #aaa; margin-bottom: 5px;">${s.desc}</div><button class="btn-skill" ${canAfford ? '' : 'disabled'} onpointerdown="buySkill('${key}')">${isMaxed ? 'MAXED' : 'Upgrade: 💎 ' + s.cost}</button></div>`;
        }
    }

    window.buySkill = function(key) {
        let s = metaSkills[key];
        if (neonShards >= s.cost && s.level < s.max) {
            neonShards -= s.cost; s.level++; renderSkills(); updateUI(); saveGame();
        }
    }

    function formatMoney(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return Math.floor(num).toString();
    }

    function updateUI() {
        moneyText.innerText = formatMoney(money);
        for (let key in upgrades) {
            let u = upgrades[key]; 
            let currentCost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level - (key === 'mult' ? 1 : 0)));
            u.elCost.innerText = (key === 'bounce' && u.level >= 4) ? "MAX" : "$" + formatMoney(currentCost);
            u.elLvl.innerText = "Lvl " + u.level;
            u.btn.disabled = money < currentCost || (key === 'bounce' && u.level >= 4);
        }
        btnPrestige.style.display = money >= PRESTIGE_COST ? 'block' : 'none';
        if (prestigeLevel > 0 || neonShards > 0) {
            btnSkills.style.display = 'block';
            shardText.style.display = 'block';
            shardCountUI.innerText = neonShards;
        }
    }

    // CLOUD SAVE INTEGRATION
    function saveGame() {
        const saveData = {
            money, prestigeLevel, neonShards, stats, activeMissions, missionsCompleted, isAudioMuted,
            upgrades: { auto: upgrades.auto.level, mult: upgrades.mult.level, bounce: upgrades.bounce.level },
            meta: { max: metaSkills.maxBalls.level, fever: metaSkills.feverTime.level, mut: metaSkills.mutationRate.level },
            lastSave: Date.now()
        };
        tg.CloudStorage.setItem('asmr_save_v3', JSON.stringify(saveData), (err, ok) => {
            if(ok) { saveIndicator.style.opacity = 1; setTimeout(() => saveIndicator.style.opacity = 0, 1000); }
        });
    }

    function loadGame() {
        tg.CloudStorage.getItem('asmr_save_v3', (err, savedString) => {
            if (savedString) {
                const s = JSON.parse(savedString);
                money = s.money || 0; prestigeLevel = s.prestigeLevel || 0; neonShards = s.neonShards || 0;
                isAudioMuted = s.isAudioMuted || false;
                if(s.upgrades) { upgrades.auto.level = s.upgrades.auto; upgrades.mult.level = s.upgrades.mult; upgrades.bounce.level = s.upgrades.bounce; }
                if(s.meta) { metaSkills.maxBalls.level = s.meta.max; metaSkills.feverTime.level = s.meta.fever; metaSkills.mutationRate.level = s.meta.mut; }
                stats = s.stats || stats; activeMissions = s.activeMissions || []; missionsCompleted = s.missionsCompleted || 0;
                
                prestigeMultiplier = 1 + (prestigeLevel * 2); baseHitValue = upgrades.mult.level; bounceFactor = Math.min(0.8, 0.5 + (upgrades.bounce.level * 0.075));
                currentTheme = themes[prestigeLevel % themes.length];
                document.body.style.backgroundColor = currentTheme.bg; titleText.style.color = currentTheme.textMain;
                multiplierText.innerText = `Multiplier: x${prestigeMultiplier} (${currentTheme.name})`;

                if (s.lastSave && upgrades.auto.level > 0) {
                    let secondsAway = Math.floor((Date.now() - s.lastSave) / 1000);
                    if (secondsAway > 60) {
                        let dropsPerSec = 1000 / Math.max(250, 3000 - (upgrades.auto.level * 300));
                        let earnings = Math.min(secondsAway, 43200) * dropsPerSec * (baseHitValue * 5 * prestigeMultiplier);
                        showOfflineEarningsModal(earnings);
                    }
                }
            }
            initBoard(); initMissions(); checkMissions(); updateUI();
        });
    }

    // MODALS
    function showOfflineEarningsModal(amount) {
        isGamePaused = true; modalOverlay.style.display = 'flex'; modalTitle.innerText = "Welcome Back!";
        modalDesc.innerText = `Auto-droppers earned $${formatMoney(amount)} while away.`;
        btnModalAd.onpointerdown = () => { AdManager.showRewardedVideo("3x Profit", () => { money += (amount * 3); closeModals(); }); };
        btnModalClaim.onpointerdown = () => { money += amount; closeModals(); };
    }

    function showGoblinModal() {
        isGamePaused = true; modalOverlay.style.display = 'flex'; modalTitle.innerText = "Loot Goblin Caught!";
        let bounty = 500 * prestigeMultiplier * baseHitValue;
        modalDesc.innerText = `The goblin drops $${formatMoney(bounty)}. Watch ad for INSTANT FEVER!`;
        btnModalAd.onpointerdown = () => { AdManager.showRewardedVideo("Goblin Fever", () => { money += bounty; triggerFever(); closeModals(); }); };
        btnModalClaim.onpointerdown = () => { money += bounty; closeModals(); };
    }

    function openSettings() { isGamePaused = true; settingsOverlay.style.display = 'flex'; }
    function openMissions() { renderMissions(); isGamePaused = true; missionsOverlay.style.display = 'flex'; }
    function openSkills() { renderSkills(); isGamePaused = true; skillsOverlay.style.display = 'flex'; }
    function closeModals() { settingsOverlay.style.display = 'none'; missionsOverlay.style.display = 'none'; skillsOverlay.style.display = 'none'; modalOverlay.style.display = 'none'; isGamePaused = false; saveGame(); }
    function toggleMute() { isAudioMuted = !isAudioMuted; btnMuteToggle.innerText = isAudioMuted ? "🔇 Audio: OFF" : "🔊 Audio: ON"; }
    function hardReset() { if (confirm("Wipe Progress?")) { tg.CloudStorage.removeItem('asmr_save_v3', () => location.reload()); } }

    function buyUpgrade(type) {
        let u = upgrades[type]; let cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level - (type === 'mult' ? 1 : 0)));
        if (money >= cost) {
            money -= cost; u.level++;
            if (type === 'mult') baseHitValue = u.level;
            else if (type === 'bounce') bounceFactor = Math.min(0.8, 0.5 + (u.level * 0.075));
            updateUI(); saveGame();
        }
    }

    function doPrestige() {
        if (money >= PRESTIGE_COST) {
            AdManager.showInterstitial(() => {
                neonShards += (prestigeLevel + 1); prestigeLevel++; money = 0;
                upgrades.auto.level = 0; upgrades.mult.level = 1; upgrades.bounce.level = 0;
                baseHitValue = 1; bounceFactor = 0.5; balls = []; particles = []; feverCharge = 0; feverActive = false;
                loadGame(); // Refresh state
            });
        }
    }

    // --- ORIGINAL ENGINE CORE ---
    let audioCtx = null; const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    function playNote(pegY, isSpecial = false) { if (isAudioMuted || !audioCtx || audioCtx.currentTime < 0.1) return; const noteIndex = Math.floor((1 - (pegY / height)) * (scale.length - 1)); const freq = scale[Math.max(0, Math.min(noteIndex, scale.length - 1))] * (isSpecial ? 2 : 1); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.8); }

    let balls = [], pegs = [], buckets = [], particles = [], floatingTexts = [];
    const gravity = 0.2; const paddle = { x: 0, y: 0, width: 60, height: 10, vx: 4 };

    class FloatingText { constructor(x, y, text, color, size = 16) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; this.vy = -1.5; this.size = size; } update() { this.y += this.vy; this.life -= 0.02; } draw() { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.font = `bold ${this.size}px sans-serif`; ctx.textAlign = "center"; ctx.fillText(this.text, this.x, this.y); ctx.globalAlpha = 1.0; } }
    class Particle { constructor(x, y, color) { this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 6; this.vy = (Math.random() - 0.5) * 6; this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02; this.color = color; this.size = Math.random() * 3 + 1; } update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; } draw() { ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1.0; } }
    class Ball { constructor(x, y) { this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 2; this.vy = feverActive ? 5 : 2; this.r = Math.min(width, height) * 0.015; this.color = `hsl(${Math.random() * 360}, 100%, 70%)`; this.combo = 0; } update() { this.vy += gravity; this.x += this.vx; this.y += this.vy; if (this.x - this.r < 0 || this.x + this.r > width) { this.vx *= -bounceFactor; this.x = this.x < width/2 ? this.r : width - this.r; } } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = this.combo > 5 || feverActive ? '#fff' : this.color; ctx.fill(); } }

    function initBoard() {
        pegs = []; buckets = []; width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height;
        paddle.y = height * 0.12; paddle.vx = 4;
        for (let r = 0; r < 10; r++) { const offset = (r % 2 === 0) ? width/16 : 0; for (let c = 0; c < 8; c++) { pegs.push({ x: c * (width/8) + offset + width/16, y: height*0.2 + r*(height*0.06), radius: Math.min(width, height) * 0.012, flashTimer: 0, type: 0, pulse: Math.random() * 6 }); } }
        for (let i = 0; i < 5; i++) { buckets.push({ x: i * (width/5), y: height - 140, w: width/5, h: 40, mult: [1,3,5,3,1][i], color: ["#888","#4fc3f7","#ffeb3b","#4fc3f7","#888"][i], flashTimer: 0 }); }
    }

    function triggerFever() { feverActive = true; feverFramesLeft = getFeverDuration(); feverCharge = MAX_FEVER; stats.feversTriggered++; checkMissions(); tg.HapticFeedback.notificationOccurred('success'); }

    function gameLoop(timestamp) {
        if (AdManager.isAdPlaying || isGamePaused) { requestAnimationFrame(gameLoop); return; }
        ctx.fillStyle = feverActive ? `rgba(${Math.random()*40}, ${Math.random()*20}, ${Math.random()*40}, 0.35)` : currentTheme.trail;
        ctx.fillRect(0, 0, width, height);

        // Paddle Movement
        paddle.x += feverActive ? paddle.vx * 2 : paddle.vx;
        if (paddle.x < 40 || paddle.x > width - 40) paddle.vx *= -1;
        ctx.fillStyle = '#fff'; ctx.fillRect(paddle.x - 30, paddle.y - 5, 60, 10);

        // Auto-Drop
        if (upgrades.auto.level > 0 && timestamp - lastAutoDropTime > Math.max(250, 3000 - (upgrades.auto.level * 300))) {
            if (balls.length < getMaxBalls()) { balls.push(new Ball(paddle.x, paddle.y + 10)); lastAutoDropTime = timestamp; }
        }

        // Logic
        if (feverActive) { feverFramesLeft--; if (feverFramesLeft <= 0) { feverActive = false; feverCharge = 0; } }

        for (let b of balls) { b.update(); b.draw(); }
        for (let p of pegs) { 
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); 
            ctx.fillStyle = p.flashTimer > 0 ? '#fff' : (p.type==1?"#ffd700":currentTheme.pegOff); ctx.fill(); 
            if (p.flashTimer > 0) p.flashTimer--;
        }
        for (let i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); floatingTexts[i].draw(); if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1); }

        resolveCollisions();
        
        // Goblin Spawn
        if (!goblin.active && !feverActive && Math.random() < 0.001) { goblin.active = true; goblin.x = -50; }
        if (goblin.active) {
            goblin.x += 3; ctx.font = "40px sans-serif"; ctx.fillText("👽", goblin.x, height * 0.4);
            if (goblin.x > width + 50) goblin.active = false;
        }

        requestAnimationFrame(gameLoop);
    }

    function resolveCollisions() {
        for (let i = balls.length - 1; i >= 0; i--) {
            let b = balls[i];
            for (let p of pegs) {
                let dx = b.x - p.x, dy = b.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < b.r + p.radius) {
                    b.vy *= -bounceFactor; b.vx += (Math.random() - 0.5) * 4;
                    p.flashTimer = 15; b.combo++; tg.HapticFeedback.impactOccurred('light');
                    money += (baseHitValue * 0.1 * prestigeMultiplier);
                    if (Math.random() < getMutationRate()) p.type = 1;
                }
            }
            if (b.y > height - 140) {
                let idx = Math.floor(b.x / (width/5));
                if (buckets[idx]) {
                    let earned = baseHitValue * 10 * buckets[idx].mult * prestigeMultiplier;
                    money += earned; floatingTexts.push(new FloatingText(b.x, b.y - 20, `+$${Math.floor(earned)}`, buckets[idx].color));
                    if (!feverActive) { feverCharge += buckets[idx].mult * 10; if (feverCharge >= MAX_FEVER) triggerFever(); }
                    tg.HapticFeedback.notificationOccurred('success');
                }
                balls.splice(i, 1);
                updateUI();
            }
        }
    }

    window.addEventListener('pointerdown', (e) => {
        if (e.target.closest('button') || isGamePaused) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (goblin.active && Math.abs(e.clientX - goblin.x) < 50) { goblin.active = false; showGoblinModal(); return; }
        balls.push(new Ball(paddle.x, paddle.y + 10));
    });

    window.addEventListener('resize', initBoard);
    loadGame();
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
