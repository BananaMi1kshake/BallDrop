<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASMR Pachinko - Fixed Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>

    <style>
        body {
            margin: 0; padding: 0; background-color: #111; overflow: hidden;
            color: white; font-family: 'Segoe UI', sans-serif;
            touch-action: none; user-select: none;
        }
        canvas { display: block; }
        #header { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10;}
        h1 { margin: 0; font-size: 28px; color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; }
        #multiplierText { font-size: 14px; color: #4fc3f7; font-weight: bold; }
        #saveIndicator {
            position: absolute; top: 15px; right: 15px; font-size: 12px; color: #4caf50;
            opacity: 0; transition: opacity 0.5s; z-index: 15;
        }
        #shop {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(10, 10, 10, 0.95); display: flex; justify-content: space-around; 
            padding: 10px 5px; box-sizing: border-box; border-top: 1px solid #333; z-index: 10;
        }
        .upgrade-btn {
            flex: 1; margin: 0 5px; padding: 8px; background: #222; border: 2px solid #444; border-radius: 8px;
            color: white; font-weight: bold; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .upgrade-btn:disabled { opacity: 0.4; border-color: #111; }
        .btn-title { display: block; font-size: 12px; color: #4fc3f7; }
        .btn-cost { display: block; font-size: 15px; color: #ffeb3b; }
        .btn-level { display: block; font-size: 11px; color: #888; }
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column;
        }
        .modal-box {
            background: #1a1a24; border: 2px solid #4fc3f7; border-radius: 12px; padding: 25px;
            text-align: center; max-width: 80%; width: 300px;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1 id="titleText">$<span id="moneyText">0</span></h1>
        <span id="multiplierText">Multiplier: x1</span>
    </div>
    <div id="saveIndicator">Saved</div>
    
    <div id="shop">
        <button id="btnAuto" class="upgrade-btn" onpointerdown="buyUpgrade('auto')">
            <span class="btn-title">🤖 Auto-Drop</span>
            <span class="btn-cost" id="costAuto">$100</span><span class="btn-level" id="lvlAuto">Lvl 0</span>
        </button>
        <button id="btnMult" class="upgrade-btn" onpointerdown="buyUpgrade('mult')">
            <span class="btn-title">💎 Ball Value</span>
            <span class="btn-cost" id="costMult">$250</span><span class="btn-level" id="lvlMult">Lvl 1</span>
        </button>
        <button id="btnBounce" class="upgrade-btn" onpointerdown="buyUpgrade('bounce')">
            <span class="btn-title">🏀 Bounciness</span>
            <span class="btn-cost" id="costBounce">$500</span><span class="btn-level" id="lvlBounce">Lvl 0</span>
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // --- ADSGRAM ---
    let AdController = null;
    function getAdController() {
        if (AdController) return AdController;
        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "25014" });
            return AdController;
        }
        return null;
    }

    // --- GAME STATE ---
    let money = 0;
    const upgrades = {
        auto: { level: 0, base: 100, mult: 2.5 },
        mult: { level: 1, base: 250, mult: 2.0 },
        bounce: { level: 0, base: 500, mult: 3.0 }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, balls = [], pegs = [], buckets = [];
    const gravity = 0.25;

    // --- CORE LOGIC ---
    function getCost(type) {
        let u = upgrades[type];
        // Note: 'mult' starts at lvl 1, others at 0. 
        // We subtract the start level so the first purchase is the 'base' price.
        let startLvl = (type === 'mult') ? 1 : 0;
        return Math.floor(u.base * Math.pow(u.mult, u.level - startLvl));
    }

    function buyUpgrade(type) {
        let cost = getCost(type);
        if (type === 'bounce' && upgrades.bounce.level >= 5) return; // Cap bounciness
        
        if (money >= cost) {
            money -= cost;
            upgrades[type].level++; // THIS INCREMENTS THE LEVEL
            
            // Apply effects immediately
            if (type === 'bounce') bounceFactor = Math.min(0.85, 0.4 + (upgrades.bounce.level * 0.08));
            
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
            saveGame();
        }
    }

    function updateUI() {
        document.getElementById('moneyText').innerText = formatMoney(money);
        
        // Update Auto
        document.getElementById('lvlAuto').innerText = "Lvl " + upgrades.auto.level;
        document.getElementById('costAuto').innerText = "$" + formatMoney(getCost('auto'));
        document.getElementById('btnAuto').disabled = (money < getCost('auto'));

        // Update Mult
        document.getElementById('lvlMult').innerText = "Lvl " + upgrades.mult.level;
        document.getElementById('costMult').innerText = "$" + formatMoney(getCost('mult'));
        document.getElementById('btnMult').disabled = (money < getCost('mult'));

        // Update Bounce
        if(upgrades.bounce.level >= 5) {
            document.getElementById('costBounce').innerText = "MAX";
            document.getElementById('btnBounce').disabled = true;
        } else {
            document.getElementById('lvlBounce').innerText = "Lvl " + upgrades.bounce.level;
            document.getElementById('costBounce').innerText = "$" + formatMoney(getCost('bounce'));
            document.getElementById('btnBounce').disabled = (money < getCost('bounce'));
        }
    }

    function formatMoney(n) {
        if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
        if (n >= 1e3) return (n/1e3).toFixed(1) + "k";
        return Math.floor(n);
    }

    // --- SAVING ---
    function saveGame() {
        const data = {
            m: money,
            al: upgrades.auto.level,
            ml: upgrades.mult.level,
            bl: upgrades.bounce.level
        };
        tg.CloudStorage.setItem('asmr_pachinko_v2', JSON.stringify(data), (err, ok) => {
            if(ok) {
                const ind = document.getElementById('saveIndicator');
                ind.style.opacity = 1; setTimeout(() => ind.style.opacity = 0, 1000);
            }
        });
    }

    function loadGame() {
        tg.CloudStorage.getItem('asmr_pachinko_v2', (err, val) => {
            if(val) {
                const s = JSON.parse(val);
                money = s.m || 0;
                upgrades.auto.level = s.al || 0;
                upgrades.mult.level = s.ml || 1;
                upgrades.bounce.level = s.bl || 0;
                bounceFactor = Math.min(0.85, 0.4 + (upgrades.bounce.level * 0.08));
            }
            initBoard();
            updateUI();
        });
    }

    // --- PHYSICS & RENDER ---
    let bounceFactor = 0.4;
    class Ball {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = (Math.random()-0.5)*4; this.vy = 2;
        }
        update() {
            this.vy += gravity; this.x += this.vx; this.y += this.vy;
            if(this.x<5 || this.x>width-5) this.vx *= -bounceFactor;
        }
        draw() {
            ctx.fillStyle = "#4fc3f7"; ctx.beginPath();
            ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
        }
    }

    function initBoard() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        pegs = [];
        for(let r=0; r<9; r++) {
            let cols = (r%2 === 0) ? 7 : 8;
            for(let c=0; c<cols; c++) {
                pegs.push({ x: (c+0.5) * (width/cols), y: height*0.25 + r*45, r: 4, f: 0 });
            }
        }
        buckets = [];
        for(let i=0; i<5; i++) buckets.push({ x: i*(width/5), w: width/5, m: (i===2 ? 5 : (i%2?3:1)) });
    }

    function resolve() {
        for(let i=balls.length-1; i>=0; i--) {
            let b = balls[i];
            for(let p of pegs) {
                let dx = b.x - p.x, dy = b.y - p.y, d = Math.sqrt(dx*dx+dy*dy);
                if(d < 10) {
                    b.vy *= -bounceFactor; b.vx += (Math.random()-0.5)*3;
                    money += (upgrades.mult.level * 0.1); p.f = 10;
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
            if(b.y > height-130) {
                let idx = Math.floor(b.x / (width/5));
                if(buckets[idx]) money += (upgrades.mult.level * 5 * buckets[idx].m);
                balls.splice(i,1);
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    }

    let lastAuto = 0;
    function render(t) {
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,width,height);
        
        // Auto drop logic
        if(upgrades.auto.level > 0 && t - lastAuto > (3000 / upgrades.auto.level)) {
            balls.push(new Ball(width/2 + (Math.random()-0.5)*40, height*0.1));
            lastAuto = t;
        }

        for(let p of pegs) {
            ctx.fillStyle = p.f > 0 ? "#fff" : "#444";
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            if(p.f > 0) p.f--;
        }
        for(let b of balls) { b.update(); b.draw(); }
        
        resolve(); updateUI();
        requestAnimationFrame(render);
    }

    window.addEventListener('pointerdown', (e) => {
        if(e.target.closest('button')) return;
        balls.push(new Ball(e.clientX, height*0.1));
    });

    window.addEventListener('resize', initBoard);
    loadGame();
    requestAnimationFrame(render);
</script>
</body>
</html>
